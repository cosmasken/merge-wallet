name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: pnpm install

    - name: Build native plugin
      run: |
        cd plugins/capacitor-plugin-simple-encryption
        pnpm install
        pnpm run build

    - name: Build web app
      run: pnpm run build

    - name: Add Android platform
      run: |
        pnpm exec cap add android || echo "Android platform already exists"
        pnpm exec cap sync android

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: merge-wallet-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Android AAB (Release)
      if: github.ref == 'refs/heads/main'
      run: |
        cd android
        ./gradlew bundleRelease

    - name: Upload AAB artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: merge-wallet-release.aab
        path: android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 90