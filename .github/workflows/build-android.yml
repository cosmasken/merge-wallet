name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: pnpm install

    - name: Build web app
      run: pnpm run build

    - name: Add Android platform
      run: |
        pnpm exec cap add android || echo "Android platform already exists"
        pnpm exec cap sync android

    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Setup keystore for signing
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      run: |
        # Decode keystore from base64 secret
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > android/app/release-key.keystore

    - name: Prepare Gradle signing properties
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cat <<EOF >> android/local.properties
        RELEASE_STORE_FILE=app/release-key.keystore
        RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD
        RELEASE_KEY_ALIAS=$KEY_ALIAS
        RELEASE_KEY_PASSWORD=$KEY_PASSWORD
        EOF

    - name: Build Android APK (Release - Signed)
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: merge-wallet-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Signed APK
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: merge-wallet-release-signed.apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 90

    - name: Build Android AAB (Release - Signed)
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      run: |
        cd android
        ./gradlew bundleRelease

    - name: Upload AAB artifact
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: merge-wallet-release.aab
        path: android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 90